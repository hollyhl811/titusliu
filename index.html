<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>刘洋浦 (Titus Liu) — 税务科技与数字化转型专家</title>
<style>
  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f7f7f9;
    --bg-card: #ffffff;
    --bg-hero-from: #1d1d1f;
    --bg-hero-to: #2c2c2e;
    --border: #e5e5e7;
    --border-strong: #d2d2d7;
    --text-primary: #1d1d1f;
    --text-secondary: #515154;
    --text-muted: #86868b;
    --accent: #5a4a8c;
    --accent-soft: #7c6cb0;
    --shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
    --shadow-hover: 0 4px 16px rgba(0, 0, 0, 0.08);
    --radius: 4px;
    --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    --serif: "Source Han Serif SC", "Noto Serif SC", "Songti SC", "STSong", Georgia, "Times New Roman", serif;
    --sans: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html {
    scroll-behavior: smooth;
  }

  body {
    font-family: var(--sans);
    background: var(--bg-primary);
    color: var(--text-primary);
    line-height: 1.75;
    font-size: 15px;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height: 100vh;
    overflow-x: hidden;
  }

  html {
    overflow-x: hidden;
  }

  /* ============ Top Bar ============ */
  .topbar {
    position: sticky;
    top: 0;
    background: rgba(255, 255, 255, 0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    z-index: 100;
    padding: 14px 0;
  }

  .topbar-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .topbar-brand {
    font-size: 13px;
    color: var(--text-secondary);
    letter-spacing: 0.12em;
    font-weight: 500;
    text-transform: uppercase;
  }

  .topbar-brand .dot {
    color: var(--accent);
    margin: 0 10px;
  }

  .lang-switch {
    display: flex;
    gap: 0;
    background: var(--bg-secondary);
    padding: 3px;
    border-radius: 4px;
    border: 1px solid var(--border);
  }

  .lang-switch button {
    background: transparent;
    border: none;
    color: var(--text-secondary);
    padding: 5px 14px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    border-radius: 3px;
    transition: var(--transition);
    font-family: inherit;
    letter-spacing: 0.05em;
  }

  .lang-switch button.active {
    background: var(--text-primary);
    color: #fff;
  }

  .lang-switch button:not(.active):hover {
    color: var(--text-primary);
  }

  /* ============ Topbar Nav & Print ============ */
  .topbar-nav {
    display: flex;
    gap: 28px;
  }

  .topbar-nav-link {
    color: var(--text-secondary);
    text-decoration: none;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    transition: var(--transition);
    position: relative;
    padding: 4px 0;
  }

  .topbar-nav-link::after {
    content: "";
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: var(--accent);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.25s ease;
  }

  .topbar-nav-link:hover {
    color: var(--text-primary);
  }

  .topbar-nav-link:hover::after {
    transform: scaleX(1);
  }

  .topbar-actions {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .download-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-secondary);
    padding: 6px 12px;
    border-radius: 3px;
    cursor: pointer;
    font-size: 11px;
    font-family: inherit;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: var(--transition);
    text-decoration: none;
  }

  .download-btn:hover {
    border-color: var(--text-primary);
    color: var(--text-primary);
  }

  .download-btn svg {
    width: 12px;
    height: 12px;
    stroke: currentColor;
    fill: none;
  }

  /* ============ Hero Current Role & Highlight Bar ============ */
  .hero-current-role {
    font-size: 13px;
    color: #c9bfe0;
    margin-bottom: 16px;
    letter-spacing: 0.05em;
    font-weight: 500;
    position: relative;
  }

  .highlight-bar {
    margin-top: 40px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    border-top: 1px solid rgba(255, 255, 255, 0.12);
    border-left: 1px solid rgba(255, 255, 255, 0.12);
    position: relative;
  }

  .highlight-item {
    padding: 22px 20px;
    border-right: 1px solid rgba(255, 255, 255, 0.12);
    border-bottom: 1px solid rgba(255, 255, 255, 0.12);
  }

  .highlight-number {
    font-family: var(--serif);
    font-size: 32px;
    font-weight: 600;
    color: #ffffff;
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .highlight-label {
    font-size: 10px;
    color: #aeaeb2;
    margin-top: 8px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    line-height: 1.4;
  }

  /* ============ Signature Project ============ */
  .signature-project {
    background: var(--bg-secondary);
    border-left: 2px solid var(--accent);
    padding: 26px 30px;
    position: relative;
  }

  .signature-tag {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10px;
  }

  .signature-title {
    font-family: var(--serif);
    font-size: 21px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 12px;
    line-height: 1.4;
    letter-spacing: -0.005em;
  }

  .signature-desc {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.85;
    margin-bottom: 12px;
  }

  .signature-meta {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-weight: 500;
  }

  /* ============ Skill Groups ============ */
  .skill-group {
    margin-bottom: 18px;
  }

  .skill-group:last-child {
    margin-bottom: 0;
  }

  .skill-group-title {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .skill-group-items {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }

  /* ============ Clients Section (4-row alternating marquee) ============ */
  .clients-section {
    margin-top: 0;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }

  .clients-section::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image: url("assets/hero-tax.webp");
    background-size: cover;
    background-position: center;
    opacity: 0.1;
    z-index: 0;
    pointer-events: none;
  }

  .clients-section > * {
    position: relative;
    z-index: 1;
  }

  .clients-label {
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    font-weight: 600;
    color: var(--text-muted);
    text-align: center;
    padding: 24px 0 14px;
  }

  .clients-marquee {
    padding: 0 0 28px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-width: 0;
    max-width: 100%;
  }

  .clients-row {
    display: flex;
    overflow: hidden;
    white-space: nowrap;
    min-width: 0;
    max-width: 100%;
  }

  .clients-track {
    display: flex;
    flex-shrink: 0;
    align-items: baseline;
  }

  .clients-row[data-dir="left"] .clients-track {
    animation: marquee-left var(--marquee-duration, 60s) linear infinite;
  }

  .clients-row[data-dir="right"] .clients-track {
    animation: marquee-right var(--marquee-duration, 60s) linear infinite;
  }

  .clients-marquee:hover .clients-track {
    animation-play-state: paused;
  }

  @keyframes marquee-left {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }

  @keyframes marquee-right {
    from { transform: translateX(-50%); }
    to   { transform: translateX(0); }
  }

  .client-item {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 500;
    color: var(--text-secondary);
    padding: 0 26px;
    position: relative;
    transition: color 0.25s ease;
    white-space: nowrap;
    letter-spacing: 0.01em;
    flex-shrink: 0;
  }

  .client-item::after {
    content: "·";
    position: absolute;
    right: 0;
    top: 50%;
    transform: translateY(-52%);
    color: var(--accent);
    opacity: 0.45;
    font-size: 22px;
    font-weight: 700;
  }

  .client-item:hover {
    color: var(--accent);
  }

  @media (prefers-reduced-motion: reduce) {
    .clients-track {
      animation: none !important;
    }
    .clients-row[data-dir="right"] .clients-track {
      transform: translateX(-50%);
    }
  }

  @media (max-width: 880px) {
    .client-item {
      font-size: 17px;
      padding: 0 16px;
    }
    .client-item::after {
      font-size: 17px;
    }
    .clients-marquee {
      padding: 0 0 22px;
      gap: 4px;
    }
  }

  /* ============ Print ============ */
  @media print {
    .topbar, .topbar-nav, .download-btn, .lang-switch, .topbar-actions {
      display: none !important;
    }
    body {
      background: #ffffff;
      color: #000000;
      font-size: 10pt;
    }
    .hero {
      background: #ffffff !important;
      color: #000000 !important;
      padding: 0 0 16px 0;
      margin: 0;
      border-bottom: 1.5px solid #000000;
      max-width: none;
    }
    .hero::before, .hero::after { display: none; }
    .hero-name, .hero-title, .hero-current-role {
      color: #000000 !important;
    }
    .hero-name .en {
      color: #555555 !important;
    }
    .hero-divider {
      background: #5a4a8c;
    }
    .hero-subtitle, .hero-contact a, .hero-contact span {
      color: #333333 !important;
    }
    .hero-contact svg { stroke: #5a4a8c !important; }
    .highlight-bar {
      border-color: #999999 !important;
    }
    .highlight-item {
      border-color: #999999 !important;
    }
    .highlight-number {
      color: #000000 !important;
    }
    .highlight-label {
      color: #555555 !important;
    }
    .layout {
      grid-template-columns: 1fr 2fr;
      gap: 20px;
      padding: 16px 0;
      max-width: none;
    }
    .sidebar {
      position: static;
    }
    .signature-project, .summary-card, .clients-section {
      background: #ffffff !important;
      border-color: #cccccc !important;
      box-shadow: none !important;
    }
    .clients-marquee {
      display: block;
      padding: 8px 0 16px;
      -webkit-mask-image: none !important;
      mask-image: none !important;
    }
    .clients-row:nth-child(n+2) {
      display: none;
    }
    .clients-row {
      overflow: visible !important;
    }
    .clients-track {
      animation: none !important;
      transform: none !important;
      flex-wrap: wrap;
      white-space: normal;
      justify-content: center;
      gap: 8px 0;
    }
    .clients-track .client-item:nth-child(n+22) {
      display: none;
    }
    .client-item {
      font-size: 13pt !important;
      color: #222222 !important;
      padding: 0 18px !important;
    }
    .client-item::after {
      color: #5a4a8c !important;
    }
    .project-card, .achievement-card, .achievement-list-item, .experience-item {
      break-inside: avoid;
      box-shadow: none !important;
    }
    .signature-title, .experience-company, .achievement-number, .highlight-number {
      color: #000000 !important;
    }
    footer {
      border-top: 1px solid #cccccc;
      color: #555555;
      padding: 16px 0;
    }
    a[href]:after {
      content: "";
    }
    .project-card:hover, .client-item:hover, .achievement-card:hover {
      background: transparent !important;
      transform: none !important;
      color: inherit !important;
    }
  }

  /* Responsive — small screens */
  @media (max-width: 880px) {
    .topbar-nav {
      display: none;
    }
    .highlight-bar {
      grid-template-columns: repeat(2, 1fr);
    }
  }

  /* ============ Hero ============ */
  .hero {
    background: linear-gradient(135deg, var(--bg-hero-from) 0%, var(--bg-hero-to) 100%);
    max-width: 1200px;
    margin: 0 auto;
    padding: 90px 40px 70px;
    position: relative;
    overflow: hidden;
  }

  .hero-name {
    font-family: var(--serif);
    font-size: 56px;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: #ffffff;
    margin-bottom: 6px;
    position: relative;
    line-height: 1.2;
  }

  .hero-name .en {
    color: #aeaeb2;
    font-weight: 400;
    font-size: 22px;
    margin-left: 14px;
    letter-spacing: 0.02em;
    font-style: italic;
  }

  .hero-divider {
    width: 60px;
    height: 2px;
    background: var(--accent);
    margin: 18px 0 22px;
  }

  .hero-title {
    font-size: 19px;
    color: #f5f5f7;
    font-weight: 400;
    margin-bottom: 6px;
    letter-spacing: 0.01em;
    position: relative;
  }

  .hero-subtitle {
    font-size: 13px;
    color: #aeaeb2;
    margin-bottom: 32px;
    letter-spacing: 0.06em;
    position: relative;
    text-transform: uppercase;
  }

  .hero-contact {
    display: flex;
    flex-wrap: wrap;
    gap: 28px;
    font-size: 14px;
    position: relative;
  }

  .hero-contact a,
  .hero-contact span {
    color: #d1d1d6;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    transition: var(--transition);
  }

  .hero-contact a:hover {
    color: #ffffff;
  }

  .hero-contact svg {
    width: 13px;
    height: 13px;
    stroke: var(--accent);
  }

  /* ============ Layout ============ */
  .layout {
    max-width: 1200px;
    margin: 0 auto;
    padding: 60px 40px 80px;
    display: grid;
    grid-template-columns: 300px 1fr;
    gap: 60px;
  }

  main {
    min-width: 0;
  }

  /* ============ Sidebar ============ */
  .sidebar {
    position: sticky;
    top: 90px;
    align-self: start;
    display: flex;
    flex-direction: column;
    gap: 36px;
  }

  /* ============ Sections ============ */
  .section-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 18px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  .section-title-main {
    font-family: var(--serif);
    font-size: 24px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 28px;
    letter-spacing: -0.005em;
    display: flex;
    align-items: center;
    gap: 16px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }

  .section-title-main::before {
    content: "";
    width: 3px;
    height: 20px;
    background: var(--accent);
  }

  /* ============ Skills Tags ============ */
  .skill-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .skill-tag {
    font-size: 12px;
    padding: 5px 11px;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    color: var(--text-secondary);
    border-radius: 3px;
    transition: var(--transition);
    font-weight: 400;
    letter-spacing: 0.02em;
  }

  .skill-tag:hover {
    border-color: var(--text-primary);
    color: var(--text-primary);
  }

  /* ============ Info List (Education, Certs, Awards) ============ */
  .info-item {
    padding: 13px 0;
    border-bottom: 1px solid var(--border);
  }

  .info-item:last-child {
    border-bottom: none;
    padding-bottom: 0;
  }

  .info-item:first-child {
    padding-top: 0;
  }

  .info-item-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 3px;
  }

  .info-item-sub {
    font-size: 12px;
    color: var(--text-secondary);
  }

  .info-item-meta {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
    letter-spacing: 0.03em;
    text-transform: uppercase;
  }

  /* ============ Summary Card ============ */
  .summary-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-left: 2px solid var(--accent);
    padding: 22px 26px;
    border-radius: 0;
    font-size: 14.5px;
    color: var(--text-secondary);
    line-height: 1.85;
    margin-bottom: 0;
  }

  /* ============ Experience Timeline ============ */
  .experience-item {
    position: relative;
    padding: 0 0 40px 28px;
    border-left: 1px solid var(--border-strong);
  }

  .experience-item:last-child {
    padding-bottom: 0;
    border-left: 1px solid transparent;
  }

  .experience-item::before {
    content: "";
    position: absolute;
    left: -5px;
    top: 4px;
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: var(--bg-primary);
    border: 2px solid var(--accent);
  }

  .experience-item:last-child::before {
    background: var(--accent);
  }

  .experience-period {
    display: inline-block;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.12em;
    margin-bottom: 8px;
    font-weight: 600;
    text-transform: uppercase;
  }

  .experience-company {
    font-family: var(--serif);
    font-size: 19px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 2px;
    letter-spacing: -0.005em;
  }

  .experience-meta {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 6px;
    letter-spacing: 0.03em;
  }

  .experience-role {
    font-size: 13px;
    color: var(--accent);
    font-weight: 500;
    margin-bottom: 14px;
    font-style: italic;
    letter-spacing: 0.01em;
  }

  .experience-bullets li {
    list-style: none;
    font-size: 13.5px;
    color: var(--text-secondary);
    margin-bottom: 7px;
    padding-left: 16px;
    position: relative;
    line-height: 1.75;
  }

  .experience-bullets li::before {
    content: "—";
    position: absolute;
    left: 0;
    top: 0;
    color: var(--text-muted);
    font-size: 12px;
  }

  /* ============ Project Cards ============ */
  .projects-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 0;
    margin-bottom: 24px;
    border-top: 1px solid var(--border);
    border-left: 1px solid var(--border);
  }

  .project-card {
    background: var(--bg-card);
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 24px 26px;
    border-radius: 0;
    transition: var(--transition);
  }

  .project-card:hover {
    background: var(--bg-secondary);
  }

  .project-name {
    font-family: var(--serif);
    font-size: 16px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 4px;
  }

  .project-role {
    font-size: 11px;
    color: var(--accent);
    margin-bottom: 12px;
    letter-spacing: 0.12em;
    font-weight: 600;
    text-transform: uppercase;
  }

  .project-desc {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.75;
  }

  .other-clients {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    padding: 20px 24px;
    border-radius: 0;
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.85;
  }

  .other-clients strong {
    color: var(--text-primary);
    display: block;
    margin-bottom: 8px;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-weight: 600;
  }

  /* ============ Achievements ============ */
  .achievement-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0;
    margin-bottom: 24px;
    border-top: 1px solid var(--border);
    border-left: 1px solid var(--border);
  }

  .achievement-card {
    background: var(--bg-card);
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 28px 20px;
    border-radius: 0;
    text-align: center;
    transition: var(--transition);
  }

  .achievement-card:hover {
    background: var(--bg-secondary);
  }

  .achievement-number {
    font-family: var(--serif);
    font-size: 36px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .achievement-label {
    font-size: 11px;

      const offset = Math.floor((idx * wall.length) / rows);

      const loop = [...reordered, ...reordered];
      const items = loop
